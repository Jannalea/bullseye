function computeRSI(closes, period) {
  if (!closes || closes.length < period + 1) return 50;
  var gains = 0, losses = 0, i, diff;
  for (i = closes.length - period; i < closes.length; i++) {
    diff = closes[i] - closes[i - 1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  var avgGain = gains / period, avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  return Math.round(100 - 100 / (1 + avgGain / avgLoss));
}

function fetchJ(url) {
  return fetch(url)
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .catch(function() {
      return fetch('https://corsproxy.io/?' + encodeURIComponent(url))
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .catch(function() {
          return fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url))
            .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function(d) { return JSON.parse(d.contents); });
        });
    });
}

function fetchFxRate() {
  return fetchJ('https://query1.finance.yahoo.com/v8/finance/chart/EURUSD%3DX?interval=1d&range=5d')
    .then(function(data) {
      var p = data.chart.result[0].meta.regularMarketPrice;
      if (p && p > 0) FX_USDEUR = 1 / p;
    })
    .catch(function() {});
}

function fetchStock(ticker) {
  var base = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(ticker);
  var chartUrl   = base + '?interval=1d&range=1y&includePrePost=false';
  var intradayUrl = base + '?interval=5m&range=1d&includePrePost=false';
  var sumUrl = 'https://query1.finance.yahoo.com/v10/finance/quoteSummary/' +
    encodeURIComponent(ticker) + '?modules=defaultKeyStatistics%2CrecommendationTrend';
  return Promise.all([fetchJ(chartUrl), fetchJ(sumUrl), fetchJ(intradayUrl).catch(function(){ return null; })])
    .then(function(res) {
      var cr = res[0].chart.result[0];
      var rawC = cr.indicators.quote[0].close;
      var meta = cr.meta;
      var closes = [];
      for (var i = 0; i < rawC.length; i++) { if (rawC[i] != null && rawC[i] > 0) closes.push(rawC[i]); }
      var curP    = meta.regularMarketPrice || closes[closes.length - 1];
      var prevC   = meta.chartPreviousClose || (closes.length > 1 ? closes[closes.length - 2] : curP);
      var chPct   = prevC ? (curP - prevC) / prevC * 100 : 0;
      var cur     = (meta.currency === 'EUR' || meta.currency === 'GBp') ? 'E' : '$';
      var rsi     = computeRSI(closes, 14);
      var ma50 = 0, ma200 = 0, j, sl;
      if (closes.length >= 50)  { sl = closes.slice(-50);  for (j=0;j<50;j++)  ma50  += sl[j]; ma50  /= 50; }
      if (closes.length >= 200) { sl = closes.slice(-200); for (j=0;j<200;j++) ma200 += sl[j]; ma200 /= 200; }
      var pe = null, analystScore = null;
      try {
        var ks = res[1].quoteSummary.result[0].defaultKeyStatistics;
        pe = (ks.trailingPE && ks.trailingPE.raw) ? ks.trailingPE.raw :
             (ks.forwardPE  && ks.forwardPE.raw)  ? ks.forwardPE.raw  : null;
      } catch(e) {}
      try {
        var rt = res[1].quoteSummary.result[0].recommendationTrend.trend;
        if (rt && rt[0]) {
          var t0 = rt[0];
          var tot = (t0.strongBuy||0)+(t0.buy||0)+(t0.hold||0)+(t0.sell||0)+(t0.strongSell||0);
          if (tot > 0) analystScore = ((t0.strongBuy||0)*1+(t0.buy||0)*2+(t0.hold||0)*3+(t0.sell||0)*4+(t0.strongSell||0)*5) / tot;
        }
      } catch(e) {}
      var intraday = null;
      try {
        if (res[2]) {
          var ir = res[2].chart.result[0];
          var iRaw = ir.indicators.quote[0].close, iTs = ir.timestamp;
          var iV = [], iD = [];
          for (var k = 0; k < iRaw.length; k++) {
            if (iRaw[k] != null) { iV.push(iRaw[k]); iD.push(new Date(iTs[k] * 1000)); }
          }
          if (iV.length > 1) intraday = {vals: iV, dates: iD};
        }
      } catch(e) {}
      return {p:curP, ch:chPct, currency:cur, closes:closes, intraday:intraday, rsi:rsi, ma50:ma50, ma200:ma200, pe:pe, analystScore:analystScore, ts:Date.now()};
    });
}

function generateWhy(data) {
  var parts = [];
  if (data.rsi != null) {
    if (data.rsi < 30)      parts.push('RSI ' + data.rsi + ': ueberkauft – moeglicher Einstieg.');
    else if (data.rsi > 70) parts.push('RSI ' + data.rsi + ': ueberhitzt – Rueckschlagrisiko.');
    else                     parts.push('RSI ' + data.rsi + ' ist neutral.');
  }
  if (data.ma50 && data.ma200 && data.p) {
    if (data.p > data.ma50 && data.p > data.ma200)      parts.push('Kurs ueber MA50 und MA200 – Aufwaertstrend intakt.');
    else if (data.p < data.ma50 && data.p < data.ma200) parts.push('Kurs unter MA50 und MA200 – Abwaertstrend.');
    else                                                  parts.push('Kurs zwischen den Moving Averages – unklare Richtung.');
  }
  if (data.pe != null && data.pe > 0) {
    var peS = data.pe.toFixed(1);
    if (data.pe < 15)      parts.push('KGV ' + peS + ' ist guenstig.');
    else if (data.pe > 25) parts.push('KGV ' + peS + ' ist erhoet.');
    else                   parts.push('KGV ' + peS + ' ist moderat.');
  }
  if (data.analystScore != null) {
    var as = data.analystScore.toFixed(1);
    if (data.analystScore < 2.0)      parts.push('Analysten sehen Kaufpotenzial (Konsens: ' + as + ').');
    else if (data.analystScore > 3.0) parts.push('Analysten sind zurueckhaltend (Konsens: ' + as + ').');
    else                               parts.push('Analysten-Konsens neutral (' + as + ').');
  }
  return parts.length ? parts.join(' ') : 'Keine Signaldaten verfuegbar.';
}

function applyLiveToState(ticker, data) {
  var s = BY_T[ticker];
  if (!s) return;
  s.p  = data.p;
  s.ch = parseFloat(data.ch.toFixed(2));
  if (data.currency) s.c = data.currency;
  var score = 0;
  var rsiSig = 'n', trendSig = 'n', peSig = 'n', aSig = 'n';
  var rsiStr = data.rsi != null ? String(data.rsi) : 'k.A.';
  var trendStr = 'k.A.', peStr = 'k.A.', analystStr = 'k.A.';
  if (data.rsi != null) {
    if (data.rsi < 30)      { score++; rsiSig = 'g'; }
    else if (data.rsi > 70) { score--; rsiSig = 'r'; }
  }
  if (data.ma50 && data.ma200 && data.p) {
    if (data.p > data.ma50 && data.p > data.ma200)      { score++; trendSig = 'g'; trendStr = 'ueber beiden'; }
    else if (data.p < data.ma50 && data.p < data.ma200) { score--; trendSig = 'r'; trendStr = 'unter beiden'; }
    else { trendStr = 'gemischt'; }
  }
  if (data.pe != null && data.pe > 0) {
    peStr = data.pe.toFixed(1).replace('.', ',');
    if (data.pe < 15)      { score++; peSig = 'g'; }
    else if (data.pe > 25) { score--; peSig = 'r'; }
  }
  if (data.analystScore != null) {
    analystStr = data.analystScore.toFixed(1).replace('.', ',');
    if (data.analystScore < 2.0)      { score++; aSig = 'g'; }
    else if (data.analystScore > 3.0) { score--; aSig = 'r'; }
  }
  s.sc  = score;
  s.sig = score >= 1 ? 'green' : score <= -1 ? 'red' : 'yellow';
  s.ind = [['RSI (14)', rsiStr, rsiSig], ['Trend (MA 50/200)', trendStr, trendSig], ['KGV', peStr, peSig], ['Analysten-Konsens', analystStr, aSig]];
  s.why = generateWhy(data);
  LIVE[ticker] = data;
}

function genSeriesFromLive(s, range) {
  var allC = LIVE[s.t].closes;
  var counts = {'1W': 5, '1M': 21, '1J': Math.min(252, allC.length), 'Max': allC.length};
  var n = Math.min(counts[range] || 21, allC.length);
  var vals = allC.slice(-n);
  var now = new Date(), dates = [];
  for (var i = 0; i < vals.length; i++) {
    dates.push(new Date(now.getTime() - (vals.length - 1 - i) * 86400000));
  }
  return {vals: vals, dates: dates};
}

function loadLiveData(force) {
  if (!force) {
    try {
      var cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached && (Date.now() - cached.ts < CACHE_TTL)) {
        var d = cached.data;
        for (var t in d) {
          if (Object.prototype.hasOwnProperty.call(d, t)) applyLiveToState(t, d[t]);
        }
        S.lastLoaded = cached.ts;
        fetchFxRate().then(function() { render(); });
        return;
      }
    } catch(e) {}
  }
  S.loading = true;
  render();
  var tickers = S.wl.slice();
  var allFetches = tickers.map(function(ticker) {
    return fetchStock(ticker)
      .then(function(data) { applyLiveToState(ticker, data); })
      .catch(function(err) { console.warn(ticker + ': ' + err); });
  });
  allFetches.push(fetchFxRate());
  Promise.all(allFetches).then(function() {
    S.loading = false;
    S.lastLoaded = Date.now();
    try {
      var cData = {};
      for (var t in LIVE) { if (Object.prototype.hasOwnProperty.call(LIVE, t)) cData[t] = LIVE[t]; }
      localStorage.setItem(CACHE_KEY, JSON.stringify({ts: S.lastLoaded, data: cData}));
    } catch(e) {}
    render();
  });
}

  '1T':  {n:30, vol:.004, span:0},
  '1W':  {n:28, vol:.009, span:7},
  '1M':  {n:30, vol:.019, span:30},
  '1J':  {n:52, vol:.045, span:365},
  'Max': {n:60, vol:.080, span:1825}

function seedRng(str) {
  var h = 1779033703;
  for (var i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  var a = h >>> 0;
  return function() {
    a |= 0;
    a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function genSeries(s, range) {
  if (LIVE[s.t]) {
    if (range === '1T' && LIVE[s.t].intraday) return LIVE[s.t].intraday;
    if (range !== '1T' && LIVE[s.t].closes && LIVE[s.t].closes.length > 1) return genSeriesFromLive(s, range);
  }
  var c = CFG[range], n = c.n;
  var rand = seedRng(s.t + '|' + range);
  var ret;
  if (range === '1T') {
    ret = s.ch / 100;
  } else {
    var sign;
    if (s.sc >= 2) sign = 1;
    else if (s.sc <= -1) sign = -1;
    else sign = rand() < .5 ? -1 : 1;
    var MAG = {'1W':.05,'1M':.11,'1J':.32,'Max':1.40};
    ret = sign * MAG[range] * (.4 + rand() * 1.2);
    if (ret < -.85) ret = -.85;
  }
  var end = s.p, start = end / (1 + ret);
  var raw = [0];
  for (var i = 1; i < n; i++) raw[i] = raw[i-1] + (rand() - .5) * start * c.vol * 2;
  var raw0 = raw[0], rawN = raw[n-1];
  var vals = [];
  for (var i = 0; i < n; i++) {
    var lin = start + (end - start) * i / (n - 1);
    var resid = raw[i] - (raw0 + (rawN - raw0) * i / (n - 1));
    var v = lin + resid;
    if (v <= 0) v = start * .02;
    vals.push(v);
  }
  var now = new Date(), dates = [];
  for (var i = 0; i < n; i++) {
    var d;
    if (range === '1T') {
      var m = 9*60 + 510*i/(n-1);
      d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), Math.floor(m/60), Math.round(m%60));
    } else {
      d = new Date(now.getTime() - c.span*(1 - i/(n-1))*86400000);
    }
    dates.push(d);
  }
  return {vals: vals, dates: dates};
}

function chartGeom(vals) {
  var n = vals.length;
  var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  var W = 340, H = 150, pad = 14;
  var X = function(i) { return n === 1 ? 0 : i / (n-1) * W; };
  var Y = function(v) { return max === min ? H/2 : pad + (1 - (v-min)/(max-min)) * (H - 2*pad); };
  var poly = vals.map(function(v,i){ return X(i).toFixed(1) + ',' + Y(v).toFixed(1); }).join(' ');
  var area = 'M ' + X(0).toFixed(1) + ',' + Y(vals[0]).toFixed(1) + ' ';
  area += vals.map(function(v,i){ return 'L ' + X(i).toFixed(1) + ',' + Y(v).toFixed(1); }).join(' ');
  area += ' L ' + W + ',' + H + ' L 0,' + H + ' Z';
  return {X:X, Y:Y, poly:poly, area:area, baseY:Y(vals[0]), up: vals[n-1] >= vals[0]};
}

function signPct(p) {

function signAbs(d, cur) {
  var eur = cur === '$' ? d * FX_USDEUR : d;

// ── CHART HOVER ──────────────────────────────────────────────────────────────
function attachChartHover() {
  var wrap = document.querySelector('[data-chart]');
  if (!wrap) return;
  var ticker = wrap.getAttribute('data-chart');
  var range  = wrap.getAttribute('data-range');
  var s = BY_T[ticker];
  if (!s) return;
  var sd = genSeries(s, range);
  var vals = sd.vals, dates = sd.dates;
  var g = chartGeom(vals);
  var n = vals.length;

  function onMove(e) {
    e.preventDefault();
    var rect = wrap.getBoundingClientRect();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var frac = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
    var idx = Math.round(frac * (n - 1));
    var hx = g.X(idx).toFixed(1), hy = g.Y(vals[idx]).toFixed(1);
    var vl = document.getElementById('chv-' + ticker);
    var dt = document.getElementById('chd-' + ticker);
    if (vl) { vl.setAttribute('x1', hx); vl.setAttribute('x2', hx); vl.style.display = ''; }
    if (dt) { dt.setAttribute('cx', hx); dt.setAttribute('cy', hy); dt.style.display = ''; }

    var curV = vals[idx], startV = vals[0];
    var dAbs = curV - startV, dPct = (curV/startV - 1) * 100;
    var up = dAbs >= 0;
    var tCol = up ? '#16C784' : '#F5475B', tBg = up ? '#E7F8F0' : '#FDECEE';
    var pe = document.getElementById('dp-p-' + ticker);
    var sle = document.getElementById('dp-sl-' + ticker);
    var ce = document.getElementById('dp-c-' + ticker);
    var cbe = document.getElementById('dp-cb-' + ticker);
    if (pe)  pe.textContent  = fmtPrice(curV, s.c);
    if (sle) sle.textContent = fmtHover(dates[idx], range);
    if (ce)  { ce.textContent = S.chMode === 'pct' ? signPct(dPct) : signAbs(dAbs, s.c); ce.style.color = tCol; }
    if (cbe) cbe.style.background = tBg;
  }
  function onLeave() {
    var vl = document.getElementById('chv-' + ticker);
    var dt = document.getElementById('chd-' + ticker);
    if (vl) vl.style.display = 'none';
    if (dt) dt.style.display = 'none';
    var curV = vals[n-1], startV = vals[0];
    var dAbs = curV - startV, dPct = (curV/startV - 1) * 100;
    var up = dAbs >= 0;
    var tCol = up ? '#16C784' : '#F5475B', tBg = up ? '#E7F8F0' : '#FDECEE';
    var pe = document.getElementById('dp-p-' + ticker);
    var sle = document.getElementById('dp-sl-' + ticker);
    var ce = document.getElementById('dp-c-' + ticker);
    var cbe = document.getElementById('dp-cb-' + ticker);
    if (pe)  pe.textContent  = fmtPrice(curV, s.c);
    if (sle) sle.textContent = PER_LABEL[range];
    if (ce)  { ce.textContent = S.chMode === 'pct' ? signPct(dPct) : signAbs(dAbs, s.c); ce.style.color = tCol; }
    if (cbe) cbe.style.background = tBg;
  }
  wrap.addEventListener('mousemove',  onMove);
  wrap.addEventListener('mouseleave', onLeave);
  wrap.addEventListener('touchstart', onMove, {passive:false});
  wrap.addEventListener('touchmove',  onMove, {passive:false});
  wrap.addEventListener('touchend',   onLeave);
}

// ── SWIPE ────────────────────────────────────────────────────────────────────
function attachSwipe() {
  var els = document.querySelectorAll('[data-swipe]');
  for (var i = 0; i < els.length; i++) {
    (function(el) {
      var ticker = el.getAttribute('data-swipe');
      el.addEventListener('pointerdown', function(e) {
        try { el.setPointerCapture(e.pointerId); } catch(_) {}
        S.dragT = ticker; S.startX = e.clientX; S.dx = 0;
        el.style.transition = 'none';
      });
      el.addEventListener('pointermove', function(e) {
        if (S.dragT !== ticker) return;
        S.dx = e.clientX - S.startX;
        var base = S.openT === ticker ? -80 : 0;
        var tx = Math.max(-110, Math.min(0, base + S.dx));
        el.style.transform = 'translateX(' + tx + 'px)';
      });
      el.addEventListener('pointerup', function() {
        if (S.dragT !== ticker) return;
        var moved = Math.abs(S.dx);
        var wasOpen = S.openT === ticker;
        var tx = (wasOpen ? -80 : 0) + S.dx;
        S.dragT = null; S.dx = 0;
        if (moved < 6) {
          if (wasOpen) {
            S.openT = null;
            el.style.transition = 'transform .22s ease';
            el.style.transform = 'translateX(0)';
          } else {
            toggleExpand(ticker);
          }
        } else if (tx <= -92) {
          removeStock(ticker);
        } else if (tx <= -45) {
          S.openT = ticker;
          el.style.transition = 'transform .22s ease';
          el.style.transform = 'translateX(-80px)';
        } else {
          S.openT = null;
          el.style.transition = 'transform .22s ease';
          el.style.transform = 'translateX(0)';
        }
      });
      el.addEventListener('pointercancel', function() {
        if (S.dragT !== ticker) return;
        S.dragT = null; S.dx = 0; S.openT = null;
        el.style.transition = 'transform .22s ease';
        el.style.transform = 'translateX(0)';
      });
    })(els[i]);
  }
}

// ── EVENT DELEGATION ─────────────────────────────────────────────────────────
function attachDelegated() {
  var area = document.getElementById('scroll-area');
  area.addEventListener('click', function(e) {
    var t = e.target;
    // Sort pill
    var sp = t.closest ? t.closest('[data-sort]') : null;
    if (sp) { setSort(sp.getAttribute('data-sort')); return; }
    // Range tab
    var rt = t.closest ? t.closest('[data-range]') : null;
    if (rt && rt.hasAttribute('data-range') && !rt.hasAttribute('data-chart')) { setRange(rt.getAttribute('data-range')); return; }
    // Delete reveal
    var del = t.closest ? t.closest('[data-del]') : null;
    if (del) { removeStock(del.getAttribute('data-del')); return; }
    // Add stock (from catalog)
    var add = t.closest ? t.closest('[data-add]') : null;
    if (add) { addStock(add.getAttribute('data-add')); return; }
    // Add stock (from Yahoo Finance search)
    var addyf = t.closest ? t.closest('[data-add-yf]') : null;
    if (addyf) { addStockYF(addyf.getAttribute('data-add-yf'), addyf.getAttribute('data-name')); return; }
    // Reload live data
    var rld = t.closest ? t.closest('[data-reload]') : null;
    if (rld) { loadLiveData(true); return; }
    // Toggle change mode
    var tcm = t.closest ? t.closest('[data-toggle-mode]') : null;
    if (tcm) { toggleChMode(); return; }
  });
  area.addEventListener('input', function(e) {
    var el = e.target;
    if (el.getAttribute('data-id') === 'search') {
      S.query = el.value;
      updateSearchArea();
    } else if (el.getAttribute('data-id') === 'initials') {
      S.initials = el.value.replace(/[^A-Za-zÄÖÜäöü]/g,'').toUpperCase().slice(0,2);
      el.value = S.initials;
      try { localStorage.setItem('bullseye_initials', S.initials); } catch(e) {}
    }
  });
}

    '<div data-yfloader="1" style="padding:12px 14px;font-size:13px;color:#B5B5BA;">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C0C0C5" stroke-width="2.2" stroke-linecap="round" style="animation:spin .9s linear infinite;margin-right:7px;vertical-align:middle;"><polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>' +
      'Suche auf Yahoo Finance…</div>' +
  '</div>';
  box.innerHTML = catHtml + yfSection;
  container.appendChild(box);

  searchYahoo(q, function(yfRes) {
    var sec = box.querySelector('[data-yfsec]');
    if (!sec) return;
    if (yfRes.length) {
      var header = catRes.length ? '<div style="padding:5px 14px 3px;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#C0C0C5;background:#FAFAFA;border-top:1px solid #F4F4F5;">Alle Börsen</div>' : '';
      sec.innerHTML = header + yfRes.map(yfRowHtml).join('');
    } else if (!catRes.length) {
      box.style.cssText = 'margin-top:10px;border:1px solid #F0F0F0;border-radius:14px;padding:16px;text-align:center;font-size:13px;color:#9A9AA0;';
      box.removeAttribute('data-srbox');
      box.setAttribute('data-srbox', '1');
      box.textContent = 'Keine Aktie gefunden.';
    } else {
      sec.parentNode.removeChild(sec);
    }
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
var _listenersAttached = false;

function render() {
  var area = document.getElementById('scroll-area');
  var sc = area.scrollTop;
  area.innerHTML = S.tab === 'scanner' ? buildScanner() : buildLegende();
  area.scrollTop = sc;

  // Restore input values
  var si = area.querySelector('[data-id="search"]');
  if (si) si.value = S.query;
  var ii = area.querySelector('[data-id="initials"]');
  if (ii) ii.value = S.initials;

  updateTabBar();
  attachSwipe();
  attachChartHover();

  if (!_listenersAttached) {
    attachDelegated();
    _listenersAttached = true;
  }
}

function updateTabBar() {
  var sc = S.tab === 'scanner';
  document.getElementById('tbi-sc').setAttribute('stroke', sc ? '#0A0A0A' : '#B5B5BA');
  document.getElementById('tbl-sc').style.color = sc ? '#0A0A0A' : '#B5B5BA';
  document.getElementById('tbi-lg').setAttribute('stroke', sc ? '#B5B5BA' : '#0A0A0A');
  document.getElementById('tbl-lg').style.color = sc ? '#B5B5BA' : '#0A0A0A';
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function setTab(tab)   { S.tab = tab; render(); }
function setSort(s)    { S.sort = s; render(); }
function setRange(r)   { S.range = r; render(); }
function toggleChMode(){ S.chMode = S.chMode === 'pct' ? 'abs' : 'pct'; render(); }

function toggleExpand(t) {
  S.expanded = S.expanded === t ? null : t;
  render();
}
function removeStock(t) {
  S.wl = S.wl.filter(function(x){ return x !== t; });
  S.openT = null; S.dragT = null; S.dx = 0;
  if (S.expanded === t) S.expanded = null;
  saveWl();
  render();
}
function addStock(t) {
  if (S.wl.indexOf(t) < 0) {
    S.wl.push(t);
    S.expanded = t;
    S.query = '';
    saveWl();
  }
  render();
  setTimeout(function() {
    var el = document.querySelector('[data-ticker="' + t.replace(/"/g,'\\"') + '"]');
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 60);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
try {
  var _savedWl = JSON.parse(localStorage.getItem(WL_KEY) || 'null');
  if (Array.isArray(_savedWl) && _savedWl.length > 0) S.wl = _savedWl;
  var _savedIn = localStorage.getItem('bullseye_initials');
  if (_savedIn) S.initials = _savedIn;
} catch(e) {}
try {
  render();
  loadLiveData(false);
} catch(err) {
  document.getElementById('scroll-area').innerHTML =
    '<div style="color:red;padding:20px;font-size:13px;">Fehler: ' + err.message + '</div>';
}
</script>
</body>
</html>
